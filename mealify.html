<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FAFAF7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>La Cuisine</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      height: 100%;
      overflow: hidden; /* prevent elastic bounce revealing background */
    }

    body {
      height: 100%;
      font-family: 'Lora', Georgia, serif;
      color: #1a1a1a;
      background: #FAFAF7;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%; /* prevent font resize on rotate */
    }

    #root {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding-top: env(safe-area-inset-top); /* notch */
    }

    ::-webkit-scrollbar { width: 0; height: 0; }

    /* ── Header ── */
    .header {
      flex-shrink: 0;
      background: #FAFAF7;
      border-bottom: 1px solid #e8e4da;
      padding: 12px 16px 10px;
    }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    /* ── Tab switcher ── */
    .tabs {
      display: flex;
      gap: 4px;
      background: #ede8df;
      border-radius: 24px;
      padding: 3px;
    }
    .tab {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 9px 0;
      border-radius: 20px;
      border: none;
      background: none;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #aaa;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.18s, color 0.18s;
      position: relative;
    }
    .tab.active { background: #1a1a1a; color: #fafaf7; }
    .tab-dot {
      position: absolute;
      top: 5px; right: 18px;
      width: 6px; height: 6px;
      background: #E8472A;
      border-radius: 50%;
    }

    /* ── Scroll area ── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 18px 16px;
      padding-bottom: calc(32px + env(safe-area-inset-bottom));
    }

    /* ── Meal card ── */
    .meal-card {
      background: #fff;
      border: 1.5px solid #e8e4da;
      border-radius: 18px;
      overflow: hidden;
      margin-bottom: 14px;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s;
    }
    .meal-card:active { transform: scale(0.985); }

    /* ── Tag / badge ── */
    .tag {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 20px;
      background: #f0ece3;
      color: #999;
    }
    .day-tag {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      background: #f5f0e8;
      color: #aaa;
    }
    .label-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.03em;
      padding: 2px 7px;
      border-radius: 10px;
      white-space: nowrap;
    }

    /* ── Shopping row ── */
    .shop-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      background: #fff;
      border: 1.5px solid #e8e4da;
      border-radius: 14px;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.2s;
      min-height: 56px; /* generous touch target */
    }
    .shop-row.done { opacity: 0.38; }

    /* ── Checkbox ── */
    .check-circle {
      width: 26px; height: 26px; min-width: 26px;
      border-radius: 50%;
      border: 2px solid #d4c9b5;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s;
    }
    .check-circle.on { background: #2D9B5A; border-color: #2D9B5A; }

    /* ── Progress ── */
    .progress-track { height: 4px; background: #e8e4da; border-radius: 2px; overflow: hidden; }
    .progress-fill  { height: 100%; background: #2D9B5A; border-radius: 2px; transition: width 0.4s ease; }

    /* ── Filter pills (horizontal scroll) ── */
    .filter-row {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-pill {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid transparent;
      background: #f5f0e8;
      color: #aaa;
      white-space: nowrap;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
    }

    /* ── Bottom sheet modal ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.46);
      z-index: 900;
      display: flex;
      align-items: flex-end;
      -webkit-backdrop-filter: blur(3px);
      backdrop-filter: blur(3px);
    }
    .sheet {
      background: #FAFAF7;
      border-radius: 22px 22px 0 0;
      width: 100%;
      max-height: 90svh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 18px;
      padding-bottom: max(28px, env(safe-area-inset-bottom));
    }
    .sheet-handle {
      width: 38px; height: 4px;
      background: #d4c9b5;
      border-radius: 2px;
      margin: 13px auto 18px;
    }

    /* ── Ingredient row ── */
    .ing-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 12px;
      gap: 8px;
    }
    .ing-row:nth-child(odd) { background: #f8f4ee; }

    /* ── Form fields ── */
    /* font-size 16px prevents iOS zoom on focus */
    .field {
      font-family: 'Lora', serif;
      font-size: 16px;
      border: 1.5px solid #e0dbd0;
      border-radius: 12px;
      padding: 13px 14px;
      background: #fff;
      outline: none;
      width: 100%;
      color: #1a1a1a;
      -webkit-appearance: none;
      appearance: none;
    }
    .field:focus { border-color: #1a1a1a; }

    /* ── Button ── */
    .btn {
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s, opacity 0.1s;
    }
    .btn:active { transform: scale(0.95); opacity: 0.8; }

    /* ── Animations ── */
    @keyframes slideUp { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    .slide-up { animation: slideUp 0.22s ease forwards; }
    .fade-in  { animation: fadeIn 0.18s ease forwards; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback } = React;

/* ── Static data ────────────────────────────────────────────────── */
const SAMPLE_MEALS = [
  { id: 1, name: "Shakshuka", day: "Monday", emoji: "🍳", tags: ["breakfast","vegetarian"], color: "#E8472A",
    ingredients: [
      { name: "Eggs",            amount: "4",   unit: "pcs", label: "Dairy & Eggs" },
      { name: "Canned tomatoes", amount: "400", unit: "g",   label: "Pantry"       },
      { name: "Bell peppers",    amount: "2",   unit: "pcs", label: "Produce"      },
      { name: "Onion",           amount: "1",   unit: "pcs", label: "Produce"      },
      { name: "Cumin",           amount: "1",   unit: "tsp", label: "Spices"       },
      { name: "Paprika",         amount: "1",   unit: "tsp", label: "Spices"       },
      { name: "Feta cheese",     amount: "80",  unit: "g",   label: "Dairy & Eggs" },
    ]},
  { id: 2, name: "Salmon Pasta", day: "Tuesday", emoji: "🍝", tags: ["dinner","seafood"], color: "#FF7F50",
    ingredients: [
      { name: "Salmon fillet", amount: "300", unit: "g",      label: "Seafood"      },
      { name: "Penne pasta",   amount: "250", unit: "g",      label: "Pantry"       },
      { name: "Heavy cream",   amount: "200", unit: "ml",     label: "Dairy & Eggs" },
      { name: "Garlic",        amount: "3",   unit: "cloves", label: "Produce"      },
      { name: "Lemon",         amount: "1",   unit: "pcs",    label: "Produce"      },
      { name: "Dill",          amount: "1",   unit: "bunch",  label: "Produce"      },
      { name: "Capers",        amount: "2",   unit: "tbsp",   label: "Pantry"       },
    ]},
  { id: 3, name: "Caesar Salad", day: "Wednesday", emoji: "🥗", tags: ["lunch","vegetarian"], color: "#2D9B5A",
    ingredients: [
      { name: "Romaine lettuce", amount: "1",  unit: "head",    label: "Produce"      },
      { name: "Parmesan",        amount: "60", unit: "g",       label: "Dairy & Eggs" },
      { name: "Croutons",        amount: "100",unit: "g",       label: "Bakery"       },
      { name: "Caesar dressing", amount: "4",  unit: "tbsp",    label: "Pantry"       },
      { name: "Chicken breast",  amount: "200",unit: "g",       label: "Meat"         },
      { name: "Anchovies",       amount: "4",  unit: "fillets", label: "Seafood"      },
    ]},
  { id: 4, name: "Ramen", day: "Thursday", emoji: "🍜", tags: ["dinner","asian"], color: "#C0392B",
    ingredients: [
      { name: "Ramen noodles",    amount: "200", unit: "g",      label: "Pantry"       },
      { name: "Pork belly",       amount: "300", unit: "g",      label: "Meat"         },
      { name: "Soft boiled eggs", amount: "2",   unit: "pcs",    label: "Dairy & Eggs" },
      { name: "Miso paste",       amount: "3",   unit: "tbsp",   label: "Pantry"       },
      { name: "Soy sauce",        amount: "2",   unit: "tbsp",   label: "Pantry"       },
      { name: "Nori sheets",      amount: "4",   unit: "pcs",    label: "Pantry"       },
      { name: "Spring onions",    amount: "3",   unit: "stalks", label: "Produce"      },
      { name: "Corn",             amount: "100", unit: "g",      label: "Produce"      },
    ]},
];

const LABEL_STYLES = {
  "Produce":      { bg: "#E8F5E9", text: "#2E7D32", border: "#A5D6A7" },
  "Dairy & Eggs": { bg: "#FFF8E1", text: "#F57F17", border: "#FFE082" },
  "Pantry":       { bg: "#EDE7F6", text: "#4527A0", border: "#B39DDB" },
  "Meat":         { bg: "#FCE4EC", text: "#880E4F", border: "#F48FB1" },
  "Seafood":      { bg: "#E3F2FD", text: "#0D47A1", border: "#90CAF9" },
  "Bakery":       { bg: "#FFF3E0", text: "#E65100", border: "#FFCC80" },
  "Spices":       { bg: "#FBE9E7", text: "#BF360C", border: "#FFAB91" },
  "Other":        { bg: "#F5F5F5", text: "#424242", border: "#E0E0E0" },
};
const ALL_LABELS = Object.keys(LABEL_STYLES);
const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const lStyle = l => LABEL_STYLES[l] || LABEL_STYLES["Other"];

/* ── Tiny shared components ─────────────────────────────────────── */
function LabelBadge({ label }) {
  const s = lStyle(label);
  return <span className="label-badge" style={{ background: s.bg, color: s.text, border: `1px solid ${s.border}` }}>{label}</span>;
}

function Checkmark() {
  return (
    <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
      <path d="M1.5 5L5 8.5L11.5 1.5" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

/* ── Bottom sheet wrapper ───────────────────────────────────────── */
function BottomSheet({ onClose, children }) {
  return (
    <div className="overlay fade-in" onClick={onClose}>
      <div className="sheet slide-up" onClick={e => e.stopPropagation()}>
        <div className="sheet-handle" />
        {children}
      </div>
    </div>
  );
}

/* ── Meal detail sheet ──────────────────────────────────────────── */
function MealDetail({ meal, onClose, onAddToList, onDelete }) {
  const [confirming, setConfirming] = useState(false);
  return (
    <BottomSheet onClose={onClose}>
      {/* colour stripe */}
      <div style={{ height: 5, background: meal.color, borderRadius: 3, margin: "-18px -18px 18px" }} />

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
        <div>
          <div style={{ fontSize: 34, lineHeight: 1 }}>{meal.emoji}</div>
          <div style={{ fontSize: 21, fontWeight: 700, letterSpacing: "-0.4px", marginTop: 6 }}>{meal.name}</div>
        </div>
        <button className="btn" onClick={onClose}
          style={{ width: 36, height: 36, borderRadius: "50%", background: "#f0ece3", color: "#888", fontSize: 22, display: "flex", alignItems: "center", justifyContent: "center" }}>
          ×
        </button>
      </div>

      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 18 }}>
        <span className="day-tag">{meal.day}</span>
        {meal.tags.map(t => <span key={t} className="tag">{t}</span>)}
      </div>

      <div style={{ fontSize: 11, fontFamily: "'DM Mono',monospace", letterSpacing: "0.08em", textTransform: "uppercase", color: "#bbb", marginBottom: 8 }}>
        Ingredients
      </div>
      <div style={{ borderRadius: 14, overflow: "hidden", border: "1.5px solid #e8e4da", marginBottom: 20 }}>
        {meal.ingredients.length === 0
          ? <div style={{ padding: "16px 12px", color: "#bbb", fontSize: 14, fontStyle: "italic" }}>No ingredients yet.</div>
          : meal.ingredients.map((ing, i) => (
              <div key={i} className="ing-row">
                <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", flex: 1, minWidth: 0 }}>
                  <span style={{ fontSize: 15 }}>{ing.name}</span>
                  <LabelBadge label={ing.label} />
                </div>
                <span style={{ fontFamily: "'DM Mono',monospace", fontSize: 13, color: "#888", flexShrink: 0 }}>
                  {ing.amount} {ing.unit}
                </span>
              </div>
            ))
        }
      </div>

      <button className="btn" onClick={() => { onAddToList(meal); onClose(); }}
        style={{ width: "100%", background: "#1a1a1a", color: "#fafaf7", padding: 16, borderRadius: 16, fontFamily: "'Lora',serif", fontWeight: 700, fontSize: 16, marginBottom: 10 }}>
        Add All to Shopping List
      </button>

      {!confirming
        ? <button className="btn" onClick={() => setConfirming(true)}
            style={{ width: "100%", background: "#fff0f0", color: "#c0392b", padding: 14, borderRadius: 16, fontFamily: "'Lora',serif", fontSize: 15, border: "1.5px solid #f5c6c6" }}>
            Delete Meal
          </button>
        : <div style={{ display: "flex", gap: 10 }}>
            <button className="btn" onClick={() => setConfirming(false)}
              style={{ flex: 1, padding: 14, borderRadius: 14, background: "#f0ece3", color: "#888", fontFamily: "'Lora',serif", fontSize: 15 }}>
              Cancel
            </button>
            <button className="btn" onClick={() => { onDelete(meal.id); onClose(); }}
              style={{ flex: 1, padding: 14, borderRadius: 14, background: "#c0392b", color: "#fff", fontFamily: "'Lora',serif", fontWeight: 700, fontSize: 15 }}>
              Yes, delete
            </button>
          </div>
      }
    </BottomSheet>
  );
}

/* ── Add Meal sheet ─────────────────────────────────────────────── */
function AddMealSheet({ onClose, onAdd }) {
  const [form, setForm] = useState({ name: "", day: "Monday", emoji: "🍽️", tags: "", color: "#6366f1" });
  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));
  const submit = () => { if (!form.name.trim()) return; onAdd(form); onClose(); };
  return (
    <BottomSheet onClose={onClose}>
      <div style={{ fontSize: 19, fontWeight: 700, marginBottom: 18 }}>Add Meal</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        <div style={{ display: "flex", gap: 10 }}>
          <input className="field" value={form.emoji} onChange={set("emoji")} placeholder="🍽️"
            style={{ width: 64, textAlign: "center", fontSize: 24, flexShrink: 0 }} />
          <input className="field" value={form.name} onChange={set("name")} placeholder="Meal name" />
        </div>
        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
          <select className="field" value={form.day} onChange={set("day")} style={{ flex: 1 }}>
            {DAYS.map(d => <option key={d}>{d}</option>)}
          </select>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2, flexShrink: 0 }}>
            <span style={{ fontSize: 9, fontFamily: "'DM Mono',monospace", color: "#bbb", letterSpacing: "0.06em" }}>COLOR</span>
            <input type="color" value={form.color} onChange={set("color")}
              style={{ width: 46, height: 44, border: "1.5px solid #e0dbd0", borderRadius: 10, padding: 4, cursor: "pointer", background: "#fff" }} />
          </div>
        </div>
        <input className="field" value={form.tags} onChange={set("tags")} placeholder="Tags: dinner, vegetarian…" />
      </div>
      <div style={{ display: "flex", gap: 10, marginTop: 18 }}>
        <button className="btn" onClick={onClose}
          style={{ flex: 1, padding: 14, borderRadius: 14, background: "#f0ece3", color: "#888", fontFamily: "'Lora',serif", fontSize: 15 }}>Cancel</button>
        <button className="btn" onClick={submit}
          style={{ flex: 1, padding: 14, borderRadius: 14, background: "#1a1a1a", color: "#fafaf7", fontFamily: "'Lora',serif", fontWeight: 700, fontSize: 15 }}>Add</button>
      </div>
    </BottomSheet>
  );
}

/* ── Add Item sheet ─────────────────────────────────────────────── */
function AddItemSheet({ onClose, onAdd }) {
  const [form, setForm] = useState({ name: "", amount: "", unit: "", label: "Produce" });
  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));
  const submit = () => { if (!form.name.trim()) return; onAdd(form); onClose(); };
  return (
    <BottomSheet onClose={onClose}>
      <div style={{ fontSize: 19, fontWeight: 700, marginBottom: 18 }}>Add Item</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        <input className="field" value={form.name} onChange={set("name")} placeholder="Item name" />
        <div style={{ display: "flex", gap: 10 }}>
          <input className="field" value={form.amount} onChange={set("amount")} placeholder="Amount"
            style={{ flex: 1 }} inputMode="decimal" />
          <input className="field" value={form.unit} onChange={set("unit")} placeholder="Unit"
            style={{ flex: 1 }} />
        </div>
        <select className="field" value={form.label} onChange={set("label")}>
          {ALL_LABELS.map(l => <option key={l}>{l}</option>)}
        </select>
      </div>
      <div style={{ display: "flex", gap: 10, marginTop: 18 }}>
        <button className="btn" onClick={onClose}
          style={{ flex: 1, padding: 14, borderRadius: 14, background: "#f0ece3", color: "#888", fontFamily: "'Lora',serif", fontSize: 15 }}>Cancel</button>
        <button className="btn" onClick={submit}
          style={{ flex: 1, padding: 14, borderRadius: 14, background: "#1a1a1a", color: "#fafaf7", fontFamily: "'Lora',serif", fontWeight: 700, fontSize: 15 }}>Add</button>
      </div>
    </BottomSheet>
  );
}

/* ── Main App ───────────────────────────────────────────────────── */
function App() {
  const [view, setView]                 = useState("meals");
  const [meals, setMeals]               = useState(SAMPLE_MEALS);
  const [selectedMeal, setSelectedMeal] = useState(null);
  const [shoppingList, setShoppingList] = useState([]);
  const [checked, setChecked]           = useState({});
  const [filterLabel, setFilterLabel]   = useState("All");
  const [modal, setModal]               = useState(null);

  const addMealsToList = useCallback((meal) => {
    setShoppingList(prev => {
      const copy = [...prev];
      meal.ingredients.forEach(ing => {
        if (!copy.find(i => i.name.toLowerCase() === ing.name.toLowerCase()))
          copy.push({ ...ing, id: Date.now() + Math.random(), fromMeal: meal.name });
      });
      return copy;
    });
  }, []);

  const handleAddMeal = form => setMeals(m => [...m, {
    ...form, id: Date.now(),
    tags: form.tags.split(",").map(t => t.trim()).filter(Boolean),
    ingredients: [],
  }]);

  const deleteMeal = id => setMeals(m => m.filter(meal => meal.id !== id));

  const handleAddItem = form => setShoppingList(l => [...l, { ...form, id: Date.now() }]);
  const removeItem    = id  => setShoppingList(l => l.filter(i => i.id !== id));
  const toggleCheck   = id  => setChecked(c => ({ ...c, [id]: !c[id] }));
  const clearDone     = ()  => { setShoppingList(l => l.filter(i => !checked[i.id])); setChecked({}); };

  const checkedCount  = shoppingList.filter(i => checked[i.id]).length;
  const grouped       = shoppingList.reduce((acc, item) => {
    const lbl = item.label || "Other";
    (acc[lbl] = acc[lbl] || []).push(item);
    return acc;
  }, {});
  const usedLabels    = Object.keys(grouped);
  const visibleLabels = filterLabel === "All" ? usedLabels : usedLabels.filter(l => l === filterLabel);

  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column", overflow: "hidden" }}>

      {/* ── HEADER ── */}
      <div className="header">
        <div className="header-row">
          <div>
            <div style={{ fontSize: 19, fontWeight: 700, letterSpacing: "-0.4px" }}>🥬 La Cuisine</div>
            <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 10, color: "#bbb", letterSpacing: "0.08em", marginTop: 1 }}>
              MEAL PLANNER & SHOPPING
            </div>
          </div>
          <button className="btn" onClick={() => setModal(view === "meals" ? "addMeal" : "addItem")}
            style={{ background: "#1a1a1a", color: "#fafaf7", padding: "10px 18px", borderRadius: 28, fontFamily: "'Lora',serif", fontWeight: 700, fontSize: 14 }}>
            + Add
          </button>
        </div>

        <div className="tabs">
          <button className={`tab ${view === "meals" ? "active" : ""}`} onClick={() => setView("meals")}>
            🍽️ Meals
          </button>
          <button className={`tab ${view === "shopping" ? "active" : ""}`} onClick={() => setView("shopping")}>
            🛒 Shopping
            {shoppingList.length > 0 && <span className="tab-dot" />}
          </button>
        </div>
      </div>

      {/* ── CONTENT ── */}
      <div className="scroll-area">

        {/* ══ MEALS ══ */}
        {view === "meals" && (
          <div className="fade-in">
            <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 11, color: "#bbb", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 14 }}>
              {meals.length} meals planned
            </div>

            {meals.map(meal => (
              <div key={meal.id} className="meal-card" onClick={() => setSelectedMeal(meal)}>
                <div style={{ height: 6, background: meal.color }} />
                <div style={{ padding: "15px 16px 16px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                    <span style={{ fontSize: 30, lineHeight: 1 }}>{meal.emoji}</span>
                    <span className="day-tag">{meal.day}</span>
                  </div>
                  <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 10, letterSpacing: "-0.3px" }}>{meal.name}</div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                      {meal.tags.map(t => <span key={t} className="tag">{t}</span>)}
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                      <span style={{ fontFamily: "'DM Mono',monospace", fontSize: 11, color: "#ccc" }}>{meal.ingredients.length} ing.</span>
                      <button className="btn" onClick={e => { e.stopPropagation(); addMealsToList(meal); setView("shopping"); }}
                        style={{ background: "#f0ece3", color: "#555", padding: "7px 13px", borderRadius: 20, fontFamily: "'DM Mono',monospace", fontSize: 10, letterSpacing: "0.05em", textTransform: "uppercase" }}>
                        + List
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* ══ SHOPPING ══ */}
        {view === "shopping" && (
          <div className="fade-in">
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div>
                <div style={{ fontSize: 20, fontWeight: 700, letterSpacing: "-0.4px" }}>Shopping List</div>
                <div style={{ color: "#bbb", fontSize: 13, fontStyle: "italic", marginTop: 2 }}>{checkedCount} of {shoppingList.length} done</div>
              </div>
              {checkedCount > 0 && (
                <button className="btn" onClick={clearDone}
                  style={{ background: "#f0ece3", color: "#888", padding: "8px 14px", borderRadius: 20, fontFamily: "'DM Mono',monospace", fontSize: 10, letterSpacing: "0.06em", textTransform: "uppercase" }}>
                  Clear done
                </button>
              )}
            </div>

            {shoppingList.length > 0 && (
              <div className="progress-track" style={{ marginBottom: 16 }}>
                <div className="progress-fill" style={{ width: `${(checkedCount / shoppingList.length) * 100}%` }} />
              </div>
            )}

            {usedLabels.length > 1 && (
              <div className="filter-row" style={{ marginBottom: 18 }}>
                {["All", ...usedLabels].map(l => {
                  const s = l !== "All" ? lStyle(l) : null;
                  const active = filterLabel === l;
                  return (
                    <button key={l} className="filter-pill" onClick={() => setFilterLabel(l)}
                      style={active && l !== "All"
                        ? { background: s.bg, color: s.text, border: `1.5px solid ${s.border}` }
                        : active
                          ? { background: "#1a1a1a", color: "#fafaf7", border: "1.5px solid #1a1a1a" }
                          : {}}>
                      {l}
                    </button>
                  );
                })}
              </div>
            )}

            {shoppingList.length === 0 && (
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", padding: "64px 24px", color: "#ccc", textAlign: "center" }}>
                <div style={{ fontSize: 50, marginBottom: 14 }}>🛒</div>
                <div style={{ fontSize: 17, fontWeight: 600, marginBottom: 6 }}>Your list is empty</div>
                <div style={{ fontSize: 14, fontStyle: "italic" }}>Add meals or tap + Add</div>
              </div>
            )}

            <div style={{ display: "flex", flexDirection: "column", gap: 22 }}>
              {visibleLabels.map(label => {
                const items = grouped[label];
                const s = lStyle(label);
                return (
                  <div key={label}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                      <span style={{ fontSize: 11, fontFamily: "'DM Mono',monospace", letterSpacing: "0.06em", textTransform: "uppercase", padding: "4px 11px", borderRadius: 20, background: s.bg, color: s.text, border: `1.5px solid ${s.border}`, whiteSpace: "nowrap" }}>
                        {label}
                      </span>
                      <div style={{ flex: 1, height: 1, background: s.border }} />
                      <span style={{ fontFamily: "'DM Mono',monospace", fontSize: 10, color: "#ccc", whiteSpace: "nowrap" }}>
                        {items.filter(i => !checked[i.id]).length} left
                      </span>
                    </div>

                    <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                      {items.map(item => {
                        const done = !!checked[item.id];
                        return (
                          <div key={item.id} className={`shop-row ${done ? "done" : ""}`} onClick={() => toggleCheck(item.id)}>
                            <div className={`check-circle ${done ? "on" : ""}`}>
                              {done && <Checkmark />}
                            </div>
                            <div style={{ flex: 1, minWidth: 0 }}>
                              <div style={{ fontSize: 15, textDecoration: done ? "line-through" : "none", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                                {item.name}
                              </div>
                              {item.fromMeal && (
                                <div style={{ fontSize: 11, color: "#ccc", fontFamily: "'DM Mono',monospace", marginTop: 1 }}>
                                  {item.fromMeal}
                                </div>
                              )}
                            </div>
                            <span style={{ fontFamily: "'DM Mono',monospace", fontSize: 13, color: "#aaa", flexShrink: 0 }}>
                              {item.amount} {item.unit}
                            </span>
                            <button className="btn" onClick={e => { e.stopPropagation(); removeItem(item.id); }}
                              style={{ color: "#d4c9b5", fontSize: 22, lineHeight: 1, padding: "0 2px", flexShrink: 0 }}>
                              ×
                            </button>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {/* ── SHEETS ── */}
      {selectedMeal && <MealDetail meal={selectedMeal} onClose={() => setSelectedMeal(null)} onAddToList={addMealsToList} onDelete={deleteMeal} />}
      {modal === "addMeal" && <AddMealSheet onClose={() => setModal(null)} onAdd={handleAddMeal} />}
      {modal === "addItem" && <AddItemSheet onClose={() => setModal(null)} onAdd={handleAddItem} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
